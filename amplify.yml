version: 1

backend:
  phases:
    preBuild:
      commands:
        - echo "🧹 Clearing build cache..."
        - rm -rf node_modules .npm .amplify-hosting
        - echo "🧩 Installing backend dependencies..."
        - npm ci --cache .npm --prefer-offline
        #
        # 👇 ADD THIS LINE 👇
        # Create a dummy outputs file to pass backend type-check
        - echo "{}" > amplify_outputs.json
        #
    build:
      commands:
        - echo "🚀 Pushing backend to ensure latest Auth + secrets..."
        - npx ampx pipeline-deploy --app-id $AWS_APP_ID --branch $AWS_BRANCH

  artifacts:
    baseDirectory: .amplify/artifacts
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*

frontend:
  phases:
    preBuild:
      commands:
        - echo "🧩 Installing frontend dependencies..."
        - npm ci --cache .npm --prefer-offline
        - echo "🧾 Generating Amplify outputs..."
        - npx ampx generate outputs --app-id $AWS_APP_ID --branch $AWS_BRANCH
    build:
      commands:
        - echo "⚙️ Writing environment variables to .env.production..."
        - env | grep -e GHL_CLIENT_ID -e GHL_CLIENT_SECRET -e GHL_LOCATION_ID -e GHL_API_KEY -e BRIDGE_API_KEY -e GOOGLE_MAPS_API_KEY -e OPENAI_API_KEY -e GOOGLE_CLIENT_ID -e GOOGLE_CLIENT_SECRET -e STRIPE_SECRET_KEY -e STRIPE_WEBHOOK_SECRET -e GHL_AGENCY_TOKEN -e KVCORE_API_KEY >> .env.production
        - env | grep -e NEXT_PUBLIC_ >> .env.production
        - echo "✅ Environment variables written to .env.production"
        - echo "🏗️ Building Next.js application..."
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
